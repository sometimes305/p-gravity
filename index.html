<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>CR Unity One Week HTML Port</title>
    <script>
      (() => {
        const params = new URLSearchParams(location.search);
        let embedded = false;
        try {
          embedded = window.self !== window.top;
        } catch (_) {
          embedded = true;
        }
        if (!embedded && !params.has("loader") && !params.has("gravityLoader")) return;

        const applyLoaderFit = () => {
          const top = window.innerHeight >= 812 ? 98 : 74;
          document.documentElement.classList.add("loader-fit");
          document.documentElement.style.setProperty("--loader-top", `${top}px`);
        };
        applyLoaderFit();
        window.addEventListener("resize", applyLoaderFit, { passive: true });
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=html-port-20260513-15">
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-stage" aria-label="Pachinko game">
        <canvas id="game" width="470" height="844"></canvas>
        <video id="puchunVideo" class="puchun-video" playsinline webkit-playsinline preload="auto" muted aria-hidden="true"></video>
        <button id="spinButton" class="spin-button" type="button">PUSH</button>
        <div id="loading" class="loading">LOADING</div>
      </section>
    </main>
    <script src="game.js?v=html-port-20260513-15"></script>
  </body>
</html>
